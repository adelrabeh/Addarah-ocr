# ============================================================
# دارة الملك عبدالعزيز — Nginx Config for Railway
# Nginx يستمع على $PORT الخارجي ويوجّه /api إلى Node.js داخلياً
# ============================================================

server {
    listen __PORT__;
    server_name _;

    # ─── Security headers ────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection       "1; mode=block"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ─── API reverse proxy → Node.js على المنفذ الداخلي ─────
    location /api {
        proxy_pass         http://127.0.0.1:__API_PORT__;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # SSE — تعطيل التخزين المؤقت لـ stream الإشعارات
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # رفع ملفات حتى 200 MB
        client_max_body_size 200M;
    }

    # ─── الواجهة الأمامية (SPA) ──────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache الأصول الثابتة بقوة
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Gzip ────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml;
}
